version: '3.8'

services:
  api-convenio:
    image: valida_lead_campanha_huggy-api-convenio:latest
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == worker01
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 60s
      labels:
        # Habilita o serviço no traefik
        - traefik.enable=true
        # Configura o endereço da API no traefik
        - traefik.http.routers.api-convenio.rule=Host(`apiconvenio.meuconsig.dev.br`)
        # Define o redirecionamento para SSL
        - traefik.http.routers.api-convenio.entrypoints=websecure
        # Define o certificado SSL
        - traefik.http.routers.api-convenio.tls.certresolver=letsencryptresolver
        # Define o serviço da API no traefik
        - traefik.http.routers.api-convenio.service=api-convenio
        # Define a porta do serviço no traefik
        - traefik.http.services.api-convenio.loadbalancer.server.port=3000
        # Define o passHostHeader para o serviço no traefik
        - traefik.http.services.api-convenio.loadbalancer.passHostHeader=true
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DB_URL=postgres://postgres:uxgp7md2UdQPhgk@pgbouncer_pgbouncer_session:5432/disparador_gupshup?sslmode=disable
      - LOG_LEVEL=info
      - API_KEY=c4b4a58d3c7c0a814r7f4b3f0b8e2a0e7f2d6a1c9c0a7b2e5d8f3a6c1b9e4f7a
    networks:
      - network_swarm_public

networks:
  network_swarm_public:
    external: true

